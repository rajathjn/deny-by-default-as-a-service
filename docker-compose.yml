# docker-compose.yml
services:
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      dbdaas:
        condition: service_healthy

  dbdaas:
    build:
      context: .
      dockerfile: dbdaas.dockerfile
    restart: unless-stopped
    expose:
      - "8080"

volumes:
  caddy_data: